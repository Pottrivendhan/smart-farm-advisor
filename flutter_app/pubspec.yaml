name: smart_farm_advisor
description: AI-powered Smart Farming Assistant for Tamil Nadu farmers.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1
  dio: ^5.4.3+1

  # State management
  provider: ^6.1.2

  # Local storage
  sqflite: ^2.3.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Image
  image_picker: ^1.1.1
  cached_network_image: ^3.3.1

  # PDF & sharing
  open_filex: ^4.3.4
  share_plus: ^12.0.2

  # Charts
  fl_chart: ^0.68.0

  # Voice input
  speech_to_text: ^7.4.0

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Localisation
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/translations/

  